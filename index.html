<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year One // A First-Year Roadmap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        petalPink: '#ba7ba1',
                        lilac: '#c28cae',
                        almondSilk: '#d0aba0',
                        paleOak: '#dec4a1',
                        softPeach: '#edcf8e',
                        darkText: '#4a283d' /* A deep warm berry tone for ultimate contrast text */
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #dec4a1; /* Pale Oak as primary warm background */
            color: #4a283d;
            overflow: hidden;
        }
        .photo-track::-webkit-scrollbar {
            display: none;
        }
        .photo-track {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .carousel-view {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            visibility: hidden;
            opacity: 0;
            display: flex;
            align-items: center;
            transition: opacity 0.4s ease-in-out, visibility 0.4s;
        }
        .carousel-view.active-view {
            visibility: visible;
            opacity: 1;
            z-index: 40;
        }
    </style>
</head>
<body class="antialiased selection:bg-petalPink selection:text-white min-h-screen flex flex-col justify-between p-6 md:p-12 relative">

    <!-- TOP HEADER LAYER -->
    <header class="w-full flex justify-between items-start z-50">
        <div>
            <h1 class="text-xl font-bold tracking-tight uppercase text-darkText">Year One</h1>
            <p class="text-[10px] text-petalPink tracking-widest uppercase font-mono">My 1st-Year Roadmap</p>
        </div>
        <div id="view-indicator" class="text-[10px] font-mono uppercase tracking-widest text-petalPink">// Home Panel</div>
    </header>

    <!-- MAIN DISPLAY TRACK INTERFACE -->
    <main class="w-full h-[65vh] my-auto relative">
        
        <!-- CAROUSEL 1: HOME -->
        <div id="home-view" class="carousel-view active-view">
            <div id="home-track" class="photo-track w-full flex overflow-x-auto space-x-24 md:space-x-32 pt-12 pb-16 items-center">
                <!-- Auto-Populates -->
            </div>
        </div>

        <!-- CAROUSEL 2: ACADEMICS -->
        <div id="academics-view" class="carousel-view">
            <div id="academics-track" class="photo-track w-full flex overflow-x-auto space-x-24 md:space-x-32 pt-12 pb-16 items-center">
                <!-- Auto-Populates -->
            </div>
        </div>

        <!-- CAROUSEL 3: EVENTS -->
        <div id="events-view" class="carousel-view">
            <div id="events-track" class="photo-track w-full flex overflow-x-auto space-x-24 md:space-x-32 pt-12 pb-16 items-center">
                <!-- Auto-Populates -->
            </div>
        </div>

        <!-- CAROUSEL 4: SIDEQUESTS -->
        <div id="sidequests-view" class="carousel-view">
            <div id="sidequests-track" class="photo-track w-full flex overflow-x-auto space-x-24 md:space-x-32 pt-12 pb-16 items-center">
                <!-- Auto-Populates -->
            </div>
        </div>

        <!-- CAROUSEL 5: RECOMMENDATIONS -->
        <div id="recommendations-view" class="carousel-view justify-center">
            <div class="w-full max-w-md bg-softPeach border border-almondSilk p-8 rounded shadow-xl text-center transform -rotate-1">
                <h2 class="text-xl font-light tracking-tight mb-4 text-darkText">Leave a Mission</h2>
                <form id="suggestionForm" class="space-y-4 text-left">
                    <select class="w-full bg-paleOak border border-almondSilk text-xs p-3 rounded text-darkText focus:outline-none font-medium">
                        <option value="skills">Technical Skill / Hobby</option>
                        <option value="travel">Travel & Location</option>
                        <option value="misc">Random Life Advice</option>
                    </select>
                    <textarea rows="3" placeholder="Drop next semester missions..." class="w-full bg-paleOak border border-almondSilk text-xs p-3 rounded text-darkText focus:outline-none placeholder:text-darkText/40 font-medium"></textarea>
                    <button type="submit" class="w-full py-2.5 bg-darkText text-softPeach rounded font-mono text-[10px] uppercase tracking-widest hover:bg-darkText/90 transition-colors">Submit</button>
                </form>
            </div>
        </div>

        <!-- CAROUSEL 6: ARCHIVES -->
        <div id="archives-view" class="carousel-view">
            <div id="archives-track" class="photo-track w-full flex overflow-x-auto space-x-24 md:space-x-32 pt-12 pb-16 items-center">
                <!-- Auto-Populates -->
            </div>
        </div>

    </main>

    <!-- FIXED BOTTOM NAVIGATION BAR DOCK -->
    <footer class="w-full flex flex-col md:flex-row justify-between items-center gap-6 z-50 pt-4 border-t border-almondSilk/60">
        <div class="text-[9px] font-mono uppercase tracking-widest text-petalPink hidden md:block">© 2026 // Archive Canvas</div>
        
        <nav id="bottom-dock" class="flex flex-wrap justify-center gap-x-8 gap-y-2 text-[10px] font-mono uppercase tracking-widest font-bold text-darkText/50">
            <button data-target="home-view" class="nav-btn text-darkText transition-colors">Home</button>
            <button data-target="academics-view" class="nav-btn transition-colors">Academics</button>
            <button data-target="events-view" class="nav-btn transition-colors">Events</button>
            <button data-target="sidequests-view" class="nav-btn transition-colors">Sidequests</button>
            <button data-target="recommendations-view" class="nav-btn transition-colors">Missions</button>
            <button data-target="archives-view" class="nav-btn transition-colors">Archives</button>
        </nav>
        
        <div class="text-[9px] font-mono uppercase tracking-widest text-petalPink">Drag track sideways to explore</div>
    </footer>

    <!-- INTERACTION CONTROLLER SCRIPT -->
    <script>
        const imgCounts = {
            home: 7,          // 1 is .jpg, 2-7 are .jpeg
            academics: 10,
            events: 16,
            sidequests: 8,     // folder name is sidequ, contains 8 files
            archives: 11
        };

        function generateDramaticMeechStyle(index) {
            const rotations = ['rotate-3', '-rotate-4', 'rotate-6', '-rotate-3', 'rotate-4', '-rotate-5'];
            const margins = ['mt-0', 'mt-12', '-mt-10', 'mt-6', '-mt-8', 'mt-10'];
            return { 
                rotation: rotations[index % rotations.length], 
                margin: margins[index % margins.length] 
            };
        }

        function buildAllCarousels() {
            // Maps your structural track IDs to your exact computer folder names
            const paths = {
                'home-track': { folder: 'home', count: imgCounts.home },
                'academics-track': { folder: 'academics', count: imgCounts.academics },
                'events-track': { folder: 'events', count: imgCounts.events },
                'sidequests-track': { folder: 'sidequ', count: imgCounts.sidequests }, // Fixed tracking connection key
                'archives-track': { folder: 'archivees', count: imgCounts.archives }
            };

            Object.entries(paths).forEach(([trackId, data]) => {
                const track = document.getElementById(trackId);
                if (!track) return;
                
                track.innerHTML = '';
                
                // Double loop creates the clones necessary for infinite-wrap drag physics
                for(let loop = 0; loop < 2; loop++) {
                    for(let i = 1; i <= data.count; i++) {
                        const style = generateDramaticMeechStyle(i + (loop * data.count));
                        
                        // Handle your home folder rule explicitly: 1 is .jpg, others are .jpeg
                        let ext = 'jpeg';
                        if (data.folder === 'home' && i === 1) {
                            ext = 'jpg';
                        }
                        
                        track.innerHTML += `
                            <div class="w-[200px] md:w-[260px] flex-shrink-0 transform transition-all duration-500 ease-out hover:rotate-0 hover:scale-105 ${style.rotation} ${style.margin}">
                                <div class="w-full aspect-[3/4] max-h-[280px] md:max-h-[380px] bg-softPeach border-4 border-white rounded shadow-lg p-1">
                                    <img src="images/${data.folder}/${i}.${ext}" 
                                         alt="Roadmap Frame" 
                                         class="w-full h-full object-cover rounded-sm"
                                         onerror="this.onerror=null; this.src=this.src.endsWith('.jpeg') ? this.src.replace('.jpeg', '.jpg') : this.src.replace('.jpg', '.jpeg');">
                                </div>
                            </div>
                        `;
                    }
                }
            });
        }

        // Horizontal Drag Momentum Logic
        function setupCarouselInteractions(trackId) {
            const track = document.getElementById(trackId);
            if (!track) return;
            let isDown = false, startX, scrollLeft, velocity = 0, rafId = null;

            track.addEventListener('mousedown', (e) => {
                isDown = true;
                track.style.cursor = 'grabbing';
                startX = e.pageX - track.offsetLeft;
                scrollLeft = track.scrollLeft;
                cancelAnimationFrame(rafId);
            });
            track.addEventListener('mouseleave', () => { isDown = false; track.style.cursor = 'grab'; });
            track.addEventListener('mouseup', () => { isDown = false; track.style.cursor = 'grab'; runGlide(); });
            track.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - track.offsetLeft;
                const walk = (x - startX) * 1.5;
                const prevScroll = track.scrollLeft;
                track.scrollLeft = scrollLeft - walk;
                velocity = track.scrollLeft - prevScroll;
                wrapPositionCheck(track);
            });

            function runGlide() {
                if (Math.abs(velocity) < 0.5) return;
                track.scrollLeft += velocity;
                velocity *= 0.92;
                wrapPositionCheck(track);
                rafId = requestAnimationFrame(runGlide);
            }

            function wrapPositionCheck(el) {
                const max = el.scrollWidth - el.clientWidth;
                if (el.scrollLeft >= max - 2) el.scrollLeft = max / 2;
                else if (el.scrollLeft <= 2) el.scrollLeft = max / 2;
            }
            track.style.cursor = 'grab';
            track.style.userSelect = 'none';
        }

        function setupBottomDockNavigation() {
            const buttons = document.querySelectorAll('.nav-btn');
            const views = document.querySelectorAll('.carousel-view');
            const indicator = document.getElementById('view-indicator');

            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const target = btn.getAttribute('data-target');
                    
                    buttons.forEach(b => b.classList.remove('text-darkText', 'font-bold'));
                    btn.classList.add('text-darkText', 'font-bold');

                    views.forEach(v => v.classList.remove('active-view'));
                    const targetView = document.getElementById(target);
                    targetView.classList.add('active-view');

                    const track = targetView.querySelector('.photo-track');
                    if (track) {
                        track.scrollLeft = (track.scrollWidth - track.clientWidth) / 2;
                    }

                    indicator.innerText = `// ${btn.innerText} Panel`;
                });
            });
        }

        window.onload = () => {
            buildAllCarousels();
            ['home-track', 'academics-track', 'events-track', 'sidequests-track', 'archives-track'].forEach(setupCarouselInteractions);
            setupBottomDockNavigation();
            
            const homeTrack = document.getElementById('home-track');
            if(homeTrack) homeTrack.scrollLeft = (homeTrack.scrollWidth - homeTrack.clientWidth) / 2;
        };
    </script>
</body>
</html>
